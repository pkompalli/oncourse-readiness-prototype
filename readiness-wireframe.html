<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375">
    <title>Readiness — Oncourse</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-style: normal; }
        em, i { font-style: normal; }

        :root {
            --blue-50:  #eefaff;
            --blue-100: #daf3ff;
            --blue-500: #34affd;
            --blue-700: #167adf;
            --blue-800: #1961b4;

            --green-50:  #f1fcf5;
            --green-100: #ddfbeb;
            --green-300: #8beab8;
            --green-500: #2abd72;
            --green-600: #1faa63;
            --green-700: #1a7b4a;

            --yellow-50:  #fef8ec;
            --yellow-100: #fbecca;
            --yellow-300: #f4bf55;
            --yellow-500: #ea8616;
            --yellow-700: #ac4511;

            --orange-50:  #fff7ed;
            --orange-300: #febc73;
            --orange-500: #fa7615;
            --orange-700: #c3440b;

            --red-50:  #fdf4f3;
            --red-100: #fce6e4;
            --red-300: #f5b1ac;
            --red-500: #e15c52;
            --red-700: #ac3229;

            --grey-50:  #f6f5f5;
            --grey-100: #e7e6e6;
            --grey-200: #d2d0cf;
            --grey-300: #b3b0ad;
            --grey-400: #8c8884;
            --grey-500: #716d69;
            --grey-600: #605d5a;
            --grey-700: #52504c;
            --grey-900: #3e3d3b;
            --grey-950: #272625;
        }

        body {
            background: #b8cfe0;
            display: flex;
            justify-content: center;
            padding: 40px 20px 60px;
            font-family: "SN Pro Medium", "SF Pro Rounded", -apple-system, "Inter", sans-serif;
        }

        /* ── Phone shell ── */
        .phone {
            width: 375px;
            background: var(--blue-50);
            border-radius: 48px;
            overflow: hidden;
            box-shadow: 0 28px 72px rgba(0,0,0,0.28);
            border: 9px solid #1a1a2e;
        }
        .phone-scroll { overflow-y: auto; max-height: 780px; scroll-behavior: smooth; }

        /* Status bar */
        .status-bar {
            padding: 14px 26px 6px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
            color: var(--grey-900);
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }

        /* ── Tabs ── */
        .tabs {
            display: flex;
            background: var(--grey-100);
            margin: 4px 16px 14px;
            border-radius: 12px;
            padding: 4px;
            gap: 3px;
        }
        .tab {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            color: var(--grey-500);
            cursor: pointer;
            font-family: "SN Pro Semibold", "SF Pro Rounded", sans-serif;
        }
        .tab.active {
            background: white;
            color: var(--grey-950);
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0,0,0,0.09);
        }

        /* ── Rezzy row ── */
        .rezzy-row {
            padding: 0 16px 14px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .rezzy-col { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .rezzy-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--grey-400);
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .rezzy-avatar {
            width: 42px; height: 42px;
            border-radius: 12px;
            overflow: hidden;
            background: var(--blue-100);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px;
        }
        .rezzy-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .rezzy-bubble {
            background: white;
            border-radius: 14px;
            border-top-left-radius: 3px;
            padding: 11px 14px;
            font-size: 13px;
            color: var(--grey-900);
            line-height: 1.5;
            flex: 1;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
        }
        .rezzy-bubble b { color: var(--blue-700); font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif; }

        /* ── Overall card ── */
        .overall-card {
            margin: 0 16px 18px;
            background: white;
            border-radius: 14px;
            padding: 20px 18px 18px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
        }
        .overall-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 14px;
        }
        .overall-num-row { display: flex; align-items: baseline; gap: 3px; }
        .overall-num {
            font-size: 28px;
            font-weight: 800;
            color: var(--blue-700);
            line-height: 1;
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .overall-denom {
            font-size: 16px;
            font-weight: 600;
            color: var(--grey-300);
            font-family: "SN Pro Semibold", "SF Pro Rounded", sans-serif;
        }
        .overall-eyebrow {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--grey-400);
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
            text-align: right;
        }
        .progress-track {
            height: 8px;
            background: var(--blue-50);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--blue-700), var(--blue-500));
            border-radius: 4px;
        }
        .overall-sub {
            font-size: 11px;
            color: var(--grey-400);
            margin-top: 6px;
            font-weight: 500;
        }

        /* ── Subject groups ── */
        .groups { padding: 0 16px; }
        .group { margin-bottom: 20px; }
        .group-header {
            display: flex;
            align-items: center;
            gap: 7px;
            margin-bottom: 9px;
        }
        .group-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .group-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .group-count { font-size: 11px; color: var(--grey-400); font-weight: 500; }

        .pills { display: flex; flex-wrap: wrap; gap: 7px; }
        .pill {
            padding: 6px 13px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
            user-select: none;
            border: 1.5px solid transparent;
            font-family: "SN Pro Semibold", "SF Pro Rounded", sans-serif;
        }

        /* Green */
        .g-green .group-dot  { background: var(--green-500); }
        .g-green .group-title { color: var(--green-700); }
        .pill-green { background: var(--green-50); color: var(--green-700); border-color: var(--green-300); }
        .pill-green:hover { background: var(--green-100); }
        .pill-green.active { background: var(--green-500); color: white; border-color: var(--green-500); box-shadow: 0 3px 10px rgba(42,189,114,0.3); }

        /* Yellow */
        .g-yellow .group-dot  { background: var(--yellow-500); }
        .g-yellow .group-title { color: var(--yellow-700); }
        .pill-yellow { background: var(--yellow-50); color: var(--yellow-700); border-color: var(--yellow-300); }
        .pill-yellow:hover { background: var(--yellow-100); }
        .pill-yellow.active { background: var(--yellow-500); color: white; border-color: var(--yellow-500); box-shadow: 0 3px 10px rgba(234,134,22,0.3); }

        /* Red */
        .g-red .group-dot  { background: var(--red-500); }
        .g-red .group-title { color: var(--red-700); }
        .pill-red { background: var(--red-50); color: var(--red-700); border-color: var(--red-300); }
        .pill-red:hover { background: var(--red-100); }
        .pill-red.active { background: var(--red-500); color: white; border-color: var(--red-500); box-shadow: 0 3px 10px rgba(225,92,82,0.3); }

        /* Grey */
        .g-gray .group-dot  { background: var(--grey-400); }
        .g-gray .group-title { color: var(--grey-600); }
        .pill-gray { background: var(--grey-50); color: var(--grey-600); border-color: var(--grey-200); }
        .pill-gray:hover { background: var(--grey-100); }
        .pill-gray.active { background: var(--grey-500); color: white; border-color: var(--grey-500); }

        /* ── Detail panel ── */
        .detail-panel {
            margin: 4px 16px 0;
            background: white;
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            display: none;
        }
        .detail-panel.visible {
            display: block;
            animation: revealCard 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        @keyframes revealCard {
            from { opacity: 0; transform: scale(0.96) translateY(6px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .detail-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .detail-name {
            font-size: 17px;
            font-weight: 800;
            color: var(--grey-950);
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .detail-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 4px 11px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .badge-green  { background: var(--green-50);  color: var(--green-700);  border: 1.5px solid var(--green-300); }
        .badge-yellow { background: var(--yellow-50); color: var(--yellow-700); border: 1.5px solid var(--yellow-300); }
        .badge-red    { background: var(--red-50);    color: var(--red-700);    border: 1.5px solid var(--red-300); }
        .badge-gray   { background: var(--grey-50);   color: var(--grey-600);   border: 1.5px solid var(--grey-200); }

        /* Skill bars */
        .skill-bars { margin-bottom: 18px; }
        .skill-row  { margin-bottom: 11px; }
        .skill-meta { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .skill-label { font-size: 12px; color: var(--grey-500); font-weight: 500; }
        .skill-pct   { font-size: 12px; color: var(--grey-900); font-weight: 700; font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif; }
        .skill-track {
            height: 7px;
            background: var(--grey-100);
            border-radius: 4px;
            overflow: hidden;
        }
        .skill-fill { height: 100%; border-radius: 4px; transition: width 0.5s cubic-bezier(0.34,1.2,0.64,1); }
        .fill-know { background: linear-gradient(90deg, var(--blue-700), var(--blue-500)); }
        .fill-use  { background: linear-gradient(90deg, var(--yellow-700), var(--yellow-500)); }

        /* Topic list */
        .section-eyebrow {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            color: var(--grey-400);
            margin-bottom: 10px;
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .topic-list { margin-bottom: 16px; }
        .topic-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--grey-100);
        }
        .topic-row:last-child { border-bottom: none; }
        .topic-name { font-size: 13px; color: var(--grey-900); font-weight: 500; }
        .topic-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 9px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .tag-red    { background: var(--red-50);    color: var(--red-700); }
        .tag-yellow { background: var(--yellow-50); color: var(--yellow-700); }
        .tag-green  { background: var(--green-50);  color: var(--green-700); }
        .tag-gray   { background: var(--grey-50);   color: var(--grey-500); }

        /* Next step callout */
        .next-step {
            border-radius: 12px;
            padding: 13px 15px;
        }
        .ns-eyebrow {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 5px;
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .ns-text {
            font-size: 13px;
            line-height: 1.55;
            color: var(--grey-900);
            font-weight: 500;
        }
        .ns-text b { font-weight: 700; font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif; }

        .ns-blue   { background: var(--blue-50);   border-left: 3px solid var(--blue-700); }
        .ns-blue   .ns-eyebrow { color: var(--blue-700); }
        .ns-blue   .ns-text b  { color: var(--blue-700); }

        .ns-orange { background: var(--orange-50); border-left: 3px solid var(--orange-500); }
        .ns-orange .ns-eyebrow { color: var(--orange-700); }
        .ns-orange .ns-text b  { color: var(--orange-700); }

        .ns-red    { background: var(--red-50);    border-left: 3px solid var(--red-500); }
        .ns-red    .ns-eyebrow { color: var(--red-700); }
        .ns-red    .ns-text b  { color: var(--red-700); }

        .ns-green  { background: var(--green-50);  border-left: 3px solid var(--green-500); }
        .ns-green  .ns-eyebrow { color: var(--green-700); }
        .ns-green  .ns-text b  { color: var(--green-700); }

        /* Rezzy baseline chat */
        .baseline-card {
            display: none;
            margin-top: 14px;
            border: 1.5px solid var(--blue-100);
            background: linear-gradient(180deg, #ffffff 0%, var(--blue-50) 100%);
            border-radius: 14px;
            padding: 13px;
        }
        .baseline-card.visible { display: block; }
        .baseline-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 10px;
        }
        .baseline-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--grey-950);
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .baseline-sub {
            font-size: 11px;
            line-height: 1.45;
            color: var(--grey-500);
            margin-top: 3px;
        }
        .rezzy-action {
            border: 0;
            background: var(--blue-700);
            color: white;
            border-radius: 10px;
            padding: 8px 10px;
            font-size: 11px;
            font-weight: 800;
            white-space: nowrap;
            cursor: pointer;
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
            box-shadow: 0 3px 10px rgba(22,122,223,0.22);
        }
        .rezzy-action.secondary {
            background: white;
            color: var(--blue-700);
            border: 1.5px solid var(--blue-100);
            box-shadow: none;
        }
        .chat-log {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 10px;
        }
        .chat-line {
            max-width: 92%;
            border-radius: 12px;
            padding: 9px 10px;
            font-size: 12px;
            line-height: 1.45;
        }
        .chat-line.bot {
            align-self: flex-start;
            background: white;
            color: var(--grey-900);
            border-top-left-radius: 3px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.06);
        }
        .chat-line.user {
            align-self: flex-end;
            background: var(--blue-700);
            color: white;
            border-top-right-radius: 3px;
        }
        .answer-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
        }
        .answer-chip {
            border: 1.5px solid var(--blue-100);
            background: white;
            color: var(--grey-900);
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 11px;
            line-height: 1.2;
            font-weight: 700;
            cursor: pointer;
            font-family: "SN Pro Semibold", "SF Pro Rounded", sans-serif;
        }
        .baseline-result {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 10px 0;
        }
        .baseline-metric {
            background: white;
            border: 1px solid var(--blue-100);
            border-radius: 10px;
            padding: 10px;
        }
        .metric-label {
            font-size: 9px;
            line-height: 1.25;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--grey-400);
            font-weight: 800;
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .metric-value {
            font-size: 20px;
            color: var(--blue-700);
            font-weight: 800;
            margin-top: 4px;
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }
        .baseline-plan {
            background: white;
            border-radius: 12px;
            padding: 11px;
            border-left: 3px solid var(--green-500);
            font-size: 12px;
            line-height: 1.55;
            color: var(--grey-900);
        }
        .baseline-plan b {
            color: var(--green-700);
            font-family: "SN Pro Bold", "SF Pro Rounded", sans-serif;
        }

        /* Detail panel top accent by state */
        .detail-panel.state-green  { border-top: 3px solid var(--green-500); }
        .detail-panel.state-yellow { border-top: 3px solid var(--yellow-500); }
        .detail-panel.state-red    { border-top: 3px solid var(--red-500); }
        .detail-panel.state-gray   { border-top: 3px solid var(--grey-400); }

        .bottom-space { height: 40px; }
    </style>
</head>
<body>
<script src="readiness-engine.js"></script>
<div class="phone">
  <div class="phone-scroll" id="mainScroll">

    <div class="status-bar"><span>9:41</span><span>●●● 5G ▮▮▮</span></div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active">Readiness</div>
      <div class="tab">Badges</div>
    </div>

    <!-- Rezzy -->
    <div class="rezzy-row">
      <div class="rezzy-col">
        <div class="rezzy-label">Rezzy</div>
        <div class="rezzy-avatar">
          <img
            src="https://supabase.getoncourse.ai/storage/v1/object/public/assets/brand/rezzy/rezzy-circular.png"
            alt="Rezzy"
            onerror="this.parentNode.innerHTML='🤖'"
          >
        </div>
      </div>
      <div class="rezzy-bubble" id="rezzyMsg">
        <b>4 of 19 subjects exam-ready, Pk.</b><br>
        Tap any subject to see exactly what moves it to the next stage.
      </div>
    </div>

    <!-- Overall readiness — populated by JS -->
    <div class="overall-card">
      <div class="overall-top">
        <div class="overall-num-row">
          <span class="overall-num" id="overallNum">—</span>
          <span class="overall-denom" id="overallDenom"></span>
        </div>
        <div class="overall-eyebrow">Subjects<br>Exam-Ready</div>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="overallBar" style="width:0%"></div>
      </div>
      <div class="overall-sub" id="overallSub"></div>
    </div>

    <!-- Groups — populated by JS from engine data -->
    <div class="groups" id="groupsContainer">
      <!-- populated by renderReadiness() -->
    </div>

    <!-- Detail panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-top">
        <div class="detail-name" id="dName"></div>
        <div class="detail-badge" id="dBadge"></div>
      </div>
      <div class="skill-bars">
        <div class="skill-row">
          <div class="skill-meta">
            <span class="skill-label">Knowledge Foundation</span>
            <span class="skill-pct" id="dKnowPct"></span>
          </div>
          <div class="skill-track"><div class="skill-fill fill-know" id="dKnowBar"></div></div>
        </div>
        <div class="skill-row">
          <div class="skill-meta">
            <span class="skill-label">Clinical Application</span>
            <span class="skill-pct" id="dUsePct"></span>
          </div>
          <div class="skill-track"><div class="skill-fill fill-use" id="dUseBar"></div></div>
        </div>
      </div>
      <div class="section-eyebrow">Topics</div>
      <div class="topic-list" id="dTopics"></div>
      <div class="next-step" id="dNextStep">
        <div class="ns-eyebrow" id="dNsLabel"></div>
        <div class="ns-text"    id="dNsText"></div>
      </div>
      <div class="baseline-card" id="baselineCard"></div>
    </div>

    <div class="bottom-space"></div>
  </div>
</div>

<script>
// ── UI helpers ───────────────────────────────────────────────────────────────

const STATE_CONFIG = {
  exam_ready:  { label: 'Exam Ready',  pillClass: 'pill-green',  groupClass: 'g-green',  badgeClass: 'badge-green',  nsClass: 'ns-green',  panelClass: 'state-green'  },
  developing:  { label: 'Developing',  pillClass: 'pill-yellow', groupClass: 'g-yellow', badgeClass: 'badge-yellow', nsClass: 'ns-blue',   panelClass: 'state-yellow' },
  needs_work:  { label: 'Needs Work',  pillClass: 'pill-red',    groupClass: 'g-red',    badgeClass: 'badge-red',    nsClass: 'ns-orange', panelClass: 'state-red'    },
  not_started: { label: 'Not Started', pillClass: 'pill-gray',   groupClass: 'g-gray',   badgeClass: 'badge-gray',   nsClass: 'ns-red',    panelClass: 'state-gray'   },
};

function pct(score) { return Math.round(score * 100) + '%'; }

function tagForState(state) {
  const map = { exam_ready:'tag-green', developing:'tag-yellow', needs_work:'tag-red', not_started:'tag-gray' };
  return map[state] || 'tag-gray';
}

function nextStepText(subjectId, topicMastery) {
  const sm = RE.READINESS.subjectMastery[subjectId];
  const subTopics = Object.values(topicMastery).filter(t => t.subject_id === subjectId);
  const topicName = (t) => RE.TOPICS[t.topic_id]?.name || t.topic_id;

  switch (sm.state) {

    case 'exam_ready': {
      const developing = subTopics.filter(t => t.state === 'developing')
        .sort((a, b) => a.use_it_score - b.use_it_score);
      if (developing.length) {
        const t = developing[0];
        return { label: 'To stay Exam Ready',
          text: `<b>${topicName(t)}</b> is your most fragile area — Clinical Application at ${pct(t.use_it_score)}. ` +
                `Run a 5-question application drill every 2 weeks to stop decay.` };
      }
      const weakest = subTopics.filter(t => t.state !== 'not_started')
        .sort((a, b) => a.use_it_score - b.use_it_score)[0];
      return { label: 'To stay Exam Ready',
        text: `Strong across the board. Revisit <b>${weakest ? topicName(weakest) : 'weakest topics'}</b> in ` +
              `14 days — spaced repetition keeps scores above the exam threshold.` };
    }

    case 'developing': {
      const needsWork = subTopics.filter(t => t.state === 'needs_work')
        .sort((a, b) => a.use_it_score - b.use_it_score);
      if (needsWork.length) {
        const t = needsWork[0];
        return { label: 'To reach Exam Ready',
          text: `<b>${topicName(t)}</b> is the blocker — Clinical Application at ${pct(t.use_it_score)}. ` +
                `Do 15 Bloom's L3+ questions using the question bank's application filter. ` +
                `Flashcards alone won't move this score.` };
      }
      const lowestUse = subTopics.filter(t => t.state !== 'not_started')
        .sort((a, b) => a.use_it_score - b.use_it_score)[0];
      return { label: 'To reach Exam Ready',
        text: `Push <b>${lowestUse ? topicName(lowestUse) : 'weaker topics'}</b> above 68% Clinical Application ` +
              `(currently ${lowestUse ? pct(lowestUse.use_it_score) : '—'}). ` +
              `Target 10 application questions per session.` };
    }

    case 'needs_work': {
      const scored = subTopics.filter(t => t.state !== 'not_started')
        .sort((a, b) => b.know_it_score - a.know_it_score);
      if (scored.length) {
        const best = scored[0];
        return { label: 'To reach Developing',
          text: `<b>${topicName(best)}</b> is your strongest base here (Knowledge Foundation ${pct(best.know_it_score)}). ` +
                `Start with 20 recall flashcards daily until you hit 65%, ` +
                `then move to question bank application questions.` };
      }
      return { label: 'To reach Developing',
        text: `Pick one topic and do <b>20 recall flashcards daily</b>. ` +
              `Hit 65% Knowledge Foundation before attempting application questions.` };
    }

    default: {
      const first = subTopics[0];
      return { label: 'To get started',
        text: `Start with <b>${first ? topicName(first) : 'any topic'}</b>. ` +
              `If the subject feels too blank for a cold question set, let Rezzy baseline you first.` };
    }
  }
}

function rezzyMessage(subjectId) {
  const sm = RE.READINESS.subjectMastery[subjectId];
  const name = RE.SUBJECTS[subjectId]?.name || subjectId;
  const { topicMastery } = RE.READINESS;
  const subTopics = Object.values(topicMastery)
    .filter(t => t.subject_id === subjectId && t.state !== 'not_started');
  const topicName = (t) => `<b>${RE.TOPICS[t.topic_id]?.name || t.topic_id}</b>`;

  switch (sm.state) {
    case 'exam_ready': {
      const weakest = [...subTopics].sort((a, b) => a.use_it_score - b.use_it_score)[0];
      return `<b>${name}</b> is exam-ready. ` +
             (weakest ? `Keep ${topicName(weakest)} in rotation — it's your most likely to decay.` : `Maintain with periodic revision.`);
    }
    case 'developing': {
      const blocker = subTopics.filter(t => t.state === 'needs_work')
        .sort((a, b) => a.use_it_score - b.use_it_score)[0];
      if (blocker) {
        return `<b>${name}:</b> recall is solid but application is lagging. ` +
               `Fixing ${topicName(blocker)} is your fastest path to Exam Ready.`;
      }
      const lowest = [...subTopics].sort((a, b) => a.use_it_score - b.use_it_score)[0];
      return `<b>${name}:</b> good foundation — push Clinical Application above 68% in ` +
             `${lowest ? topicName(lowest) : 'weaker topics'} to cross over.`;
    }
    case 'needs_work': {
      const avgKnow = subTopics.length
        ? subTopics.reduce((s, t) => s + t.know_it_score, 0) / subTopics.length : 0;
      const weakest = [...subTopics].sort((a, b) => a.know_it_score - b.know_it_score)[0];
      return `<b>${name}:</b> Knowledge Foundation is at ${pct(avgKnow)} — ` +
             `${weakest ? `${topicName(weakest)} needs the most attention. ` : ''}` +
             `Build recall before you try application questions.`;
    }
    default:
      return `<b>${name}</b> is untouched. A 10-question cold attempt takes under 10 min and reveals your baseline instantly.`;
  }
}

const baselineSessions = {};

function topicNamesForSubject(subjectId) {
  return Object.values(RE.TOPICS)
    .filter(t => t.subject_id === subjectId)
    .map(t => t.name);
}

function baselineQuestions(subjectId) {
  const subjectName = RE.SUBJECTS[subjectId]?.name || subjectId;
  const topics = topicNamesForSubject(subjectId);
  const firstTopic = topics[0] || 'the first topic';
  const secondTopic = topics[1] || 'a related topic';

  return [
    {
      id: 'prior_exposure',
      text: `Before we start ${subjectName}, how much of this have you already seen in classes or previous prep?`,
      options: [
        { label: 'Almost none', know: 0.10, use: 0.05 },
        { label: 'Some basics', know: 0.32, use: 0.16 },
        { label: 'Reviewed recently', know: 0.58, use: 0.34 },
      ],
    },
    {
      id: 'foundation',
      text: `If I say ${firstTopic} and ${secondTopic}, what happens?`,
      options: [
        { label: 'Need a primer', know: 0.14, use: 0.06 },
        { label: 'Recognise terms', know: 0.38, use: 0.18 },
        { label: 'Can explain aloud', know: 0.66, use: 0.34 },
      ],
    },
    {
      id: 'clinical',
      text: `In a clinical vignette, can you pick the diagnosis or next step from clues?`,
      options: [
        { label: 'Mostly guessing', know: 0.18, use: 0.10 },
        { label: 'With prompts', know: 0.42, use: 0.34 },
        { label: 'Usually yes', know: 0.62, use: 0.58 },
      ],
    },
    {
      id: 'pace',
      text: `For the next 7 days, what study rhythm is realistic?`,
      options: [
        { label: '10 min daily', know: 0.22, use: 0.12, pace: 'light' },
        { label: '25 min blocks', know: 0.42, use: 0.30, pace: 'steady' },
        { label: 'Timed Q sets', know: 0.56, use: 0.48, pace: 'aggressive' },
      ],
    },
  ];
}

function baselineSessionFor(subjectId) {
  if (!baselineSessions[subjectId]) {
    baselineSessions[subjectId] = { subjectId, step: 0, answers: [], complete: false };
  }
  return baselineSessions[subjectId];
}

function readinessPlanForBaseline(subjectId, know, use, pace) {
  const topics = topicNamesForSubject(subjectId);
  const firstTopic = topics[0] || 'one core topic';
  const secondTopic = topics[1] || 'one clinical topic';
  const dailyTarget = pace === 'aggressive' ? '2 timed mini-sets' : pace === 'steady' ? '1 focused block' : '10 focused minutes';

  if (know < 0.35) {
    return `<b>Move from Not Started to Needs Work:</b> spend 2 days on ${firstTopic} basics, then do ${dailyTarget} with recall flashcards. Your first milestone is 65% Knowledge Foundation before heavier clinical questions.`;
  }
  if (use < 0.35) {
    return `<b>Move from Needs Work to Developing:</b> keep ${firstTopic} recall warm, but add 10 low-stakes application questions from ${secondTopic}. Rezzy would watch for Clinical Application crossing 35%.`;
  }
  return `<b>Move from Developing toward Exam Ready:</b> start mixed vignettes now. Do ${dailyTarget}, review every miss by concept, and aim for 68% Clinical Application plus 10+ application questions.`;
}

function renderBaselineIntro(subjectId) {
  const subjectName = RE.SUBJECTS[subjectId]?.name || subjectId;
  const card = document.getElementById('baselineCard');
  card.className = 'baseline-card visible';
  card.innerHTML = `
    <div class="baseline-head">
      <div>
        <div class="baseline-title">Baseline with Rezzy</div>
        <div class="baseline-sub">A quick chat to estimate Knowledge Foundation and Clinical Application before the first study session.</div>
      </div>
      <button class="rezzy-action" id="startBaselineBtn">Start</button>
    </div>
    <div class="chat-log">
      <div class="chat-line bot">Want me to baseline ${subjectName}? I will ask 4 quick questions and suggest the next move through the readiness hierarchy.</div>
    </div>`;

  document.getElementById('startBaselineBtn').addEventListener('click', () => {
    baselineSessions[subjectId] = { subjectId, step: 0, answers: [], complete: false };
    renderBaselineChat(subjectId);
  });
}

function renderBaselineChat(subjectId) {
  const session = baselineSessionFor(subjectId);
  const questions = baselineQuestions(subjectId);
  const card = document.getElementById('baselineCard');
  const asked = questions.slice(0, session.step);
  const current = questions[session.step];

  const transcript = [];
  asked.forEach((question, index) => {
    transcript.push(`<div class="chat-line bot">${question.text}</div>`);
    transcript.push(`<div class="chat-line user">${session.answers[index].label}</div>`);
  });

  if (session.complete) {
    renderBaselineResult(subjectId);
    return;
  }

  transcript.push(`<div class="chat-line bot">${current.text}</div>`);
  card.className = 'baseline-card visible';
  card.innerHTML = `
    <div class="baseline-head">
      <div>
        <div class="baseline-title">Rezzy baseline</div>
        <div class="baseline-sub">Question ${session.step + 1} of ${questions.length}</div>
      </div>
      <button class="rezzy-action secondary" id="resetBaselineBtn">Reset</button>
    </div>
    <div class="chat-log">${transcript.join('')}</div>
    <div class="answer-chips">
      ${current.options.map((option, index) => `<button class="answer-chip" data-answer="${index}">${option.label}</button>`).join('')}
    </div>`;

  document.getElementById('resetBaselineBtn').addEventListener('click', () => {
    baselineSessions[subjectId] = { subjectId, step: 0, answers: [], complete: false };
    renderBaselineIntro(subjectId);
  });

  card.querySelectorAll('.answer-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      session.answers.push(current.options[Number(chip.dataset.answer)]);
      session.step++;
      session.complete = session.step >= questions.length;
      renderBaselineChat(subjectId);
    });
  });
}

function renderBaselineResult(subjectId) {
  const session = baselineSessionFor(subjectId);
  const subjectName = RE.SUBJECTS[subjectId]?.name || subjectId;
  const know = session.answers.reduce((sum, answer) => sum + answer.know, 0) / session.answers.length;
  const use = session.answers.reduce((sum, answer) => sum + answer.use, 0) / session.answers.length;
  const pace = session.answers.find(answer => answer.pace)?.pace || 'steady';
  const card = document.getElementById('baselineCard');
  const questions = baselineQuestions(subjectId);
  const transcript = [];

  questions.forEach((question, index) => {
    transcript.push(`<div class="chat-line bot">${question.text}</div>`);
    transcript.push(`<div class="chat-line user">${session.answers[index].label}</div>`);
  });

  document.getElementById('dKnowPct').textContent = pct(know);
  document.getElementById('dUsePct').textContent = pct(use);
  document.getElementById('dKnowBar').style.width = pct(know);
  document.getElementById('dUseBar').style.width = pct(use);
  document.getElementById('rezzyMsg').innerHTML =
    `<b>${subjectName} baseline:</b> Knowledge Foundation ${pct(know)}, Clinical Application ${pct(use)}. ` +
    `This is enough to choose the first step without pretending the subject is done.`;

  card.className = 'baseline-card visible';
  card.innerHTML = `
    <div class="baseline-head">
      <div>
        <div class="baseline-title">Baseline complete</div>
        <div class="baseline-sub">Prototype estimate based on Rezzy's quick chat.</div>
      </div>
      <button class="rezzy-action secondary" id="rerunBaselineBtn">Redo</button>
    </div>
    <div class="chat-log">${transcript.join('')}</div>
    <div class="baseline-result">
      <div class="baseline-metric">
        <div class="metric-label">Knowledge Foundation</div>
        <div class="metric-value">${pct(know)}</div>
      </div>
      <div class="baseline-metric">
        <div class="metric-label">Clinical Application</div>
        <div class="metric-value">${pct(use)}</div>
      </div>
    </div>
    <div class="baseline-plan">${readinessPlanForBaseline(subjectId, know, use, pace)}</div>`;

  document.getElementById('rerunBaselineBtn').addEventListener('click', () => {
    baselineSessions[subjectId] = { subjectId, step: 0, answers: [], complete: false };
    renderBaselineChat(subjectId);
  });
}

function hideBaseline() {
  const card = document.getElementById('baselineCard');
  card.className = 'baseline-card';
  card.innerHTML = '';
}

// ── Build subject grid from engine data ─────────────────────────────────────

const RE = window.ReadinessEngine;

function renderReadiness() {
  const { subjectMastery, topicMastery } = RE.READINESS;

  // Overall count
  const allSubjects = Object.values(subjectMastery);
  const totalSubjects  = allSubjects.length;
  const readySubjects  = allSubjects.filter(s => s.state === 'exam_ready').length;
  const readyPct       = Math.round(readySubjects / totalSubjects * 100);

  document.getElementById('overallNum').textContent   = readySubjects;
  document.getElementById('overallDenom').textContent = `/ ${totalSubjects}`;
  document.getElementById('overallBar').style.width   = readyPct + '%';
  document.getElementById('overallSub').textContent   = `${readyPct}% ready for exam day`;

  // Group subjects by state
  const groups = { exam_ready: [], developing: [], needs_work: [], not_started: [] };
  for (const [sid, sm] of Object.entries(subjectMastery)) {
    groups[sm.state].push(sid);
  }

  const container = document.getElementById('groupsContainer');
  container.innerHTML = '';

  for (const state of ['exam_ready', 'developing', 'needs_work', 'not_started']) {
    const ids = groups[state];
    if (!ids.length) continue;
    const cfg = STATE_CONFIG[state];

    const pillsHtml = ids.map(sid => {
      const name = RE.SUBJECTS[sid]?.name || sid;
      return `<div class="pill ${cfg.pillClass}" data-subject="${sid}">${name}</div>`;
    }).join('');

    container.innerHTML += `
      <div class="group ${cfg.groupClass}">
        <div class="group-header">
          <div class="group-dot"></div>
          <div class="group-title">${cfg.label}</div>
          <div class="group-count">${ids.length}</div>
        </div>
        <div class="pills">${pillsHtml}</div>
      </div>`;
  }

  // Attach click handlers
  container.querySelectorAll('.pill[data-subject]').forEach(pill => {
    pill.addEventListener('click', () => showSubject(pill.dataset.subject, pill));
  });
}

// ── Subject detail panel ────────────────────────────────────────────────────

let activePill = null;

function showSubject(subjectId, pill) {
  if (activePill) activePill.classList.remove('active');
  pill.classList.add('active');
  activePill = pill;

  const { topicMastery } = RE.READINESS;
  const sm  = RE.READINESS.subjectMastery[subjectId];
  const cfg = STATE_CONFIG[sm.state];

  // Subject-level know/use: weighted avg of topic scores
  const subTopics = Object.values(topicMastery).filter(t => t.subject_id === subjectId && t.state !== 'not_started');
  const avgKnow = subTopics.length ? subTopics.reduce((s,t) => s + t.know_it_score, 0) / subTopics.length : 0;
  const avgUse  = subTopics.length ? subTopics.reduce((s,t) => s + t.use_it_score,  0) / subTopics.length : 0;

  document.getElementById('dName').textContent   = RE.SUBJECTS[subjectId]?.name || subjectId;
  const badge = document.getElementById('dBadge');
  badge.textContent = cfg.label;
  badge.className   = 'detail-badge ' + cfg.badgeClass;

  document.getElementById('dKnowPct').textContent   = pct(avgKnow);
  document.getElementById('dUsePct').textContent    = pct(avgUse);
  document.getElementById('dKnowBar').style.width   = pct(avgKnow);
  document.getElementById('dUseBar').style.width    = pct(avgUse);

  // Topics list (sorted: needs_work first, then developing, then exam_ready, then not_started)
  const stateOrder = { needs_work: 0, developing: 1, exam_ready: 2, not_started: 3 };
  const subjectTopics = Object.values(topicMastery)
    .filter(t => t.subject_id === subjectId)
    .sort((a, b) => stateOrder[a.state] - stateOrder[b.state]);

  document.getElementById('dTopics').innerHTML = subjectTopics.map(t => {
    const topicName  = RE.TOPICS[t.topic_id]?.name || t.topic_id;
    const stateLabel = STATE_CONFIG[t.state]?.label || t.state;
    return `<div class="topic-row">
      <span class="topic-name">${topicName}</span>
      <span class="topic-tag ${tagForState(t.state)}">${stateLabel}</span>
    </div>`;
  }).join('');

  // Next step callout
  const ns = nextStepText(subjectId, topicMastery);
  const nsEl = document.getElementById('dNextStep');
  nsEl.className = 'next-step ' + cfg.nsClass;
  document.getElementById('dNsLabel').textContent = ns.label;
  document.getElementById('dNsText').innerHTML    = ns.text;

  // Rezzy
  document.getElementById('rezzyMsg').innerHTML = rezzyMessage(subjectId);
  if (sm.state === 'not_started') {
    const existingSession = baselineSessions[subjectId];
    if (existingSession?.complete) {
      renderBaselineResult(subjectId);
    } else {
      renderBaselineIntro(subjectId);
    }
  } else {
    hideBaseline();
  }

  const panel = document.getElementById('detailPanel');
  panel.className = `detail-panel visible ${cfg.panelClass}`;
  setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'nearest' }), 80);
}

// ── Boot ─────────────────────────────────────────────────────────────────────
renderReadiness();
</script>
